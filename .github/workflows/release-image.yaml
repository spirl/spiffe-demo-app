name: Build and Release the image

on:
  push:
    tags:
      - 'spiffe-demo-app-*'
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write # Needed for pushing the image to the registry
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.x'

      - name: setup ko
        uses: ko-build/setup-ko@ace48d793556083a76f1e3e6068850c1f4a369aa # v0.6
      
      - name: Determine image tag
        id: tag
        run: |
          # github.ref_name is the bare tag (e.g. spiffe-demo-app-0.4.3).
          # Strip the chart/app prefix so the image tag is a clean version (0.4.3).
          # On manual workflow_dispatch from a branch, fall back to that ref name.
          tag="${{ github.ref_name }}"
          tag="${tag#spiffe-demo-app-}"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: build and push
        run: |
          KO_DOCKER_REPO=ghcr.io/spirl/spiffe-demo-app \
          ko build \
            --tags ${{ steps.tag.outputs.tag }} \
            --tag-only \
            --bare
