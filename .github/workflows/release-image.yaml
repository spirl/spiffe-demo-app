name: Build and Release the image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write # Needed for pushing the image to the registry
      
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.x'

      - name: setup ko
        uses: ko-build/setup-ko@d006021bd0c28d1ce33a07e7943d48b079944c8d # v0.9
      
      - name: build and push
        run: |
          # Use the bare tag as-is (e.g. v0.3.3) so the image tag matches the
          # chart's values.yaml convention (tag: vX.Y.Z).
          tag="${{ github.ref_name }}"
          KO_DOCKER_REPO=ghcr.io/spirl/spiffe-demo-app \
          ko build \
            --tags $tag \
            --tag-only \
            --bare
